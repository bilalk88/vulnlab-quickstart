version: '3.8'

services:

  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    ports:
      - "8088:80"
    restart: unless-stopped

  juice-shop:
    image: bkimminich/juice-shop
    container_name: juice-shop
    ports:
      - "3001:3000"
    restart: unless-stopped

  webgoat:
    image: webgoat/webgoat
    container_name: webgoat
    ports:
      - "8085:8080"
      - "9090:9090"
    restart: unless-stopped

  bwapp:
    image: raesene/bwapp
    container_name: bwapp
    ports:
      - "8082:80"
    restart: unless-stopped

  hackazon:
    image: ianwijaya/hackazon
    container_name: hackazon
    ports:
      - "8083:80"
    restart: unless-stopped

  vampi:
    image: erev0s/vampi:latest
    container_name: vampi
    ports:
      - "8087:5000"
    restart: unless-stopped

  # ── Test Databases ─────────────────────────────────────────────────────────

  mysql:
    image: mysql:5.7
    container_name: mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8084:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    restart: unless-stopped

  postgres:
    image: postgres:13
    container_name: postgres-test
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: mongo-test
    ports:
      - "27017:27017"
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-test
    ports:
      - "6379:6379"
    restart: unless-stopped

networks:
  lab_net:
    external: true
